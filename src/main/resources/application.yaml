spring:
  mvc:
    problemdetails:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 300000
  application:
    name: bytebank-customer
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  datasource:

    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
server:
  port: 8081
resilience4j:
  circuitbreaker:
    instances:
      account-service:
        sliding-window-size: 10  # avalia as últimas 10 chamadas
        minimum-number-of-calls: 5
        failure-rate-threshold: 50        # abre o circuito se 50% falharem
        wait-duration-in-open-state: 30s  # fica bloqueado por 30s
        permitted-number-of-calls-in-half-open-state: 3
logging:
  structured:
    format:
      file: logstash
  file:
    name: logs/costumers.json

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans